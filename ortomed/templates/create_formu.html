{% extends "inventario.html" %}
{% load static %}
{% block head %}
    <link rel="stylesheet" href="{% static 'lib/datatables-1.13.6/css/dataTables.bootstrap4.min.css' %}"/>
    <link rel="stylesheet"
        href="{% static 'lib/datatables-1.13.6/plugins/responsive-2.5.0/css/responsive.bootstrap4.min.css' %}"/>
    <script src="{% static 'lib/datatables-1.13.6/js/jquery.dataTables.js' %}"></script>
    <script src="{% static 'lib/datatables-1.13.6/js/dataTables.bootstrap4.min.js' %}"></script>
    <script src="{% static 'lib/datatables-1.13.6/plugins/responsive-2.5.0/js/dataTables.responsive.min.js' %}"></script>
    <script src="{% static 'lib/datatables-1.13.6/plugins/responsive-2.5.0/js/responsive.bootstrap4.min.js' %}"></script>
    <link href="{% static 'lib/jquery-ui-1.12.1/jquery-ui.min.css' %}" rel="stylesheet"/>
    <script src="{% static 'lib/jquery-ui-1.12.1/jquery-ui.min.js' %}"></script>

    <link href="{% static 'lib/select2-4.0.13/css/select2.min.css' %}" rel="stylesheet"/>
    <link href="{% static 'lib/select2-4.0.13/css/select2-bootstrap4.min.css' %}" rel="stylesheet"/>
    <script src="{% static 'lib/select2-4.0.13/js/select2.min.js' %}"></script>
    <script src="{% static 'lib/select2-4.0.13/js/i18n/es.js' %}"></script>

    <script src="{% static 'lib/moment-2.25.3/moment-with-locales.js' %}"></script>
    <script src="{% static 'lib/tempusdominus-bootstrap-4/tempusdominus-bootstrap-4.min.js' %}"></script>
    <link href="{% static 'lib/tempusdominus-bootstrap-4/tempusdominus-bootstrap-4.min.css' %}" rel="stylesheet"/>

    <link href="{% static 'lib/bootstrap-touchspin-4.3.0/jquery.bootstrap-touchspin.css' %}" rel="stylesheet"/>
    <script src="{% static 'lib/bootstrap-touchspin-4.3.0/jquery.bootstrap-touchspin.js' %}"></script>

    <script src="{% static 'js/selecactivos.js' %}"></script>
{% endblock %}

{% block content %}
    <form method="post">
        <div class="card card-primary">
            <div class="card-header">
                <h3 class="card-title">
                    <i class="fas fa-plus"></i> 
                    {{ title }}
                </h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card card-secondary">
                            <div class="card-header">
                                <h3 class="card-title"><i class="fas fa-boxes"></i> Detalle de activos</h3>
                            </div>
                            <div class="card-body">
                                <div class="form-group">
                                    <label>Buscador de activos:</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" name="search"
                                               placeholder="Ingrese el nombre del activo" autocomplete="off">
                                        <span class="input-group-append">
                                        <button type="button" class="btn btn-danger btn-flat btnClearSearch"><i
                                                class="fas fa-times"></i></button>
                                      </span>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-lg-6">
                                        <div class="form-group">
                                            <label>Cantidad</label>
                                            <input type="text" class="form-control" name="cant"
                                                       placeholder="Ingrese la cantidad" autocomplete="off">
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group">
                                            <label>Unidad</label>
                                            <select class= "form-control" name="unidad">
                                                <option value=""></option>
                                                <option value="g">g</option>
                                                <option value="mg">mg</option>
                                                <option value="mcg">mcg</option>
                                                <option value="UI">UI</option>
                                            </select>
                                        </div>

                                    </div>
                                  </div>
                                <div class= "row">
                                    <div class="col-lg-6">
                                        <button type="button" class="btn btn-success btn-flat btnAddActivo">
                                            <i class="fas fa-plus"></i> Añadir Activo
                                        </button>
                                    </div>
                                </div> 
                                <hr>
                                <div class= "row">
                                    <div class="col-lg-10">
                                        <button type="button" class="btn btn-danger btn-flat btnRemoveAll">
                                            <i class="fas fa-trash"></i> Eliminar todos mis items
                                        </button> 
                                    </div>
                                    <div class="col-lg-2">
                                        <button type="submit" class="btn btn-primary btn-flat btnCotizar" style="margin-left:90px">
                                            <i class="fas fa-save"></i> Cotizar
                                        </button> 
                                    </div>
                                </div>
                                <hr>
                                <table class="table table-bordered" id="tblformu">
                                    <thead>
                                    <tr>
                                        <th scope="col" style="width: 10%">Eliminar</th>
                                        <th scope="col" style="width: 10%">Código ODOO</th>
                                        <th scope="col" style="width: 40%">Activo</th>
                                        <th scope="col" style="width: 20%">Cantidad</th>
                                        <th scope="col" style="width: 20%">Unidad</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                
            </div>
        </div>
    </form>
{% endblock %}
